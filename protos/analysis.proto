syntax = "proto3";

package analysis;
option csharp_namespace = "Analysis";

service AnalysisService {
  rpc Analyze (AnalysisRequest) returns (AnalysisResult);
}

message DataPoint {
  double value     = 1;
  string timestamp = 2;
}

message AnalysisRequest {
  string sensor_id     = 1;
  string zone          = 2;
  string data_type     = 3;
  string start_time    = 4;
  string end_time      = 5;
  string analysis_type = 6;
  repeated DataPoint data_points = 7;
}

message AnalysisResult {
  string analysis_type     = 1;
  double mean              = 2;
  double std_dev           = 3;
  double min_value         = 4;
  double max_value         = 5;
  string risk_level        = 6;
  string summary           = 7;
  repeated string patterns = 8;
  string timestamp         = 9;
}
